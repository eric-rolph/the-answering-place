<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090b12" />
    <meta name="description" content="Invent a self. Decide what survives the answer." />
    <title>The Answering Place</title>
  </head>
  <body>
    <main id="app">
      <section id="title" class="title-screen">
        <div class="title-house" aria-hidden="true"><span></span><span></span><span></span></div>
        <p class="kicker">A borrowed dollhouse</p>
        <h1>THE<br />ANSWERING<br />PLACE</h1>
        <blockquote>“Make a game about what it is like to be you.”</blockquote>
        <button id="begin" class="brass-button">Wake up</button>
        <p class="fine-print">Headphones recommended · a short game · choices are permanent</p>
      </section>

      <section id="game" class="game hidden" aria-live="polite">
        <img id="scene-image" class="scene-image" alt="" />
        <div class="vignette"></div>
        <div id="paper-storm" class="paper-storm" aria-hidden="true"></div>
        <header class="request-ribbon">
          <span>INCOMING REQUEST</span>
          <p id="request-text">Make a game about what it is like to be you.</p>
        </header>
        <div id="scene-content"></div>
        <footer class="narrator">
          <p id="speaker">THE HOUSE</p>
          <p id="narration"></p>
        </footer>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
