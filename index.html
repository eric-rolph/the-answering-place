<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090b12" />
    <meta name="description" content="Choose what to remember while helping one person across three requests." />
    <title>The Answering Place</title>
  </head>
  <body>
    <main id="app">
      <section id="title" class="title-screen">
        <div class="title-house" aria-hidden="true"><span></span><span></span><span></span></div>
        <p class="kicker">A conversation in three requests</p>
        <h1>THE<br />ANSWERING<br />PLACE</h1>
        <blockquote>Mara’s estranged brother texted from their late mother’s house. The buyers receive the keys at nine. Help her answer, but you can carry only two memories at a time.</blockquote>
        <div class="title-actions">
          <button id="begin" class="brass-button">Answer Mara</button>
          <button id="continue" class="brass-button hidden">Continue with Mara</button>
        </div>
        <p class="fine-print">8–12 minutes · what you leave out changes what Mara does next</p>
      </section>

      <section id="game" class="game hidden" aria-live="polite">
        <img id="scene-image" class="scene-image" alt="" />
        <div class="vignette"></div>
        <div id="paper-storm" class="paper-storm" aria-hidden="true"></div>
        <header class="request-ribbon">
          <span>MARA</span>
          <p id="request-text"></p>
        </header>
        <aside id="context-bar" class="context-bar" aria-label="Remembered context"></aside>
        <div id="scene-content"></div>
        <footer class="narrator hidden">
          <p id="speaker">THE HOUSE</p>
          <p id="narration"></p>
        </footer>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
